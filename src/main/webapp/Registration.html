<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: linear-gradient(135deg, #006eff, #6f00ff);
      }
      .box {
        width: 500px;
        background-color: white;
        padding: 24px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .box h1 {
        padding: 8px;
        font-weight: 500;
        color: #006eff;
      }
      .form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 12px;
      }
      .form .pword a {
        font-size: 14px;
        text-decoration: none;
        color: rgb(192, 66, 250);
        padding-left: 8px;
      }
      .form input {
        padding: 12px;
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.2);
        border-radius: 4px;
      }
      .form .group {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      #cpswd {
        font-style: italic;
        color: red;
        font-size: 14px;
        visibility: hidden;
        display: none;
      }
      .registerBtn {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      #registerBtn {
        background-image: linear-gradient(160deg, #006eff, #6f00ff);
        cursor: pointer;
        border: none;
        color: white;
        font-weight: 700;
      }
      .registerBtn p a {
        text-decoration: none;
        color: #006eff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Register</h1>
      <form class="form" action="reg" method="POST">
        <div class="group">
          <label for="fname">Name</label>
          <input id="fname" type="text" placeholder="Enter Name" name="name" />
        </div>
        <div class="group">
          <label for="email">Email</label>
          <input
            id="email"
            type="text"
            placeholder="Enter Email"
            name="email"
          />
        </div>
        <div class="group">
          <label for="pword">Password</label>
          <input
            id="pword"
            type="password"
            placeholder="Enter password"
            name="pword"
            required
          />
        </div>
        <div class="group">
          <label for="cpword">Confirm Password</label>
          <input
            id="cpword"
            type="password"
            placeholder="Enter password"
            name="cpword"
            onkeyup="confirmPasswrod()"
          />
          <p id="cpswd">password doesn't match</p>
        </div>
        <div class="registerBtn">
          <input
            id="registerBtn"
            type="submit"
            value="REGISTER"
            name="registerBtn"
            onclick="register()"
          />
          <p>Already have an account? <a href="login.html">LOGIN</a></p>
        </div>
      </form>
    </div>

    <script>
      function confirmPasswrod() {
        let pass = document.getElementById("pword").value;
        let cpass = document.getElementById("cpword").value;

        console.log(pass);
        console.log(cpass);

        let p = document.getElementById("cpswd");

        if (cpass != pass) {
          p.style.display = "inline-block";
          p.style.visibility = "visible";
        } else {
          p.style.visibility = "hidden";
          p.style.display = "none";

          return true;
        }
      }

      function register() {
        if (confirmPasswrod()) {
          return;
        } else {
        }
      }
    </script>
  </body>
</html>
